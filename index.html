<!DOCTYPE html>
<html>
<head>
  <title>Store Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      background: #1e293b;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 12px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
      border: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-add {
      background: #22c55e;
      color: white;
    }

    .btn-sell {
      background: #ef4444;
      color: white;
    }

    .btn-stock {
      background: #3b82f6;
      color: white;
    }

    .product {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .low {
      color: #ef4444;
      font-weight: bold;
    }
  </style>
</head>
<body>

<header>📦 Store Manager</header>

<div class="container">

  <div class="card">
    <h3>Add Product</h3>
    <input id="name" placeholder="Product name">
    <input id="stock" type="number" placeholder="Starting stock">
    <button class="btn-add" onclick="addProduct()">Add Product</button>
  </div>

  <div id="products"></div>

</div>

<script>
const SUPABASE_URL = "YOUR_URL";
const SUPABASE_KEY = "YOUR_KEY";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadProducts() {
  const { data } = await client.from("products").select("*");

  let html = "";

  data.forEach(p => {
    const low = p.stock <= 5 ? "low" : "";

    html += `
      <div class="card">
        <div class="product">
          <div>
            <b>${p.name}</b><br>
            <span class="${low}">Stock: ${p.stock}</span>
          </div>
        </div>

        <button class="btn-sell" onclick="sell('${p.id}', ${p.stock})">Sell</button>
        <button class="btn-stock" onclick="addStock('${p.id}', ${p.stock})">Add Stock</button>
      </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

async function addProduct() {
  const name = document.getElementById("name").value;
  const stock = parseInt(document.getElementById("stock").value);

  if (!name || !stock) return alert("Fill all fields");

  await client.from("products").insert([{ name, stock }]);

  loadProducts();
}

async function sell(id, stock) {
  if (stock <= 0) return alert("Out of stock");

  await client.from("products")
    .update({ stock: stock - 1 })
    .eq("id", id);

  await client.from("sales")
    .insert([{ product_id: id, quantity: 1 }]);

  loadProducts();
}

async function addStock(id, stock) {
  await client.from("products")
    .update({ stock: stock + 1 })
    .eq("id", id);

  loadProducts();
}

loadProducts();
</script>

const SUPABASE_KEY = "sb_publishable_Eod8FUbYqBLjYtxMEqxskA_PHK-1ryh";
</body>
</html>
