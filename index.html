<!DOCTYPE html>
<html>
<head>
  <title>Store POS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      background: #1e293b;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 12px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
      border: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 8px;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .sell { background: #ef4444; color: white; }
    .add { background: #22c55e; color: white; }
    .stock { background: #3b82f6; color: white; }

    .low { color: #ef4444; }

    .topbar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<header>🧾 Store POS System</header>

<div class="container">

  <div class="card">
    <div class="topbar">
      <div>📊 Today Sold:</div>
      <div id="todaySales">0</div>
    </div>
  </div>

  <div class="card">
    <h3>Add Product</h3>
    <input id="name" placeholder="Product name">
    <input id="stock" type="number" placeholder="Starting stock">
    <button class="add" onclick="addProduct()">Add Product</button>
  </div>

  <div id="products"></div>

</div>

<script>
const SUPABASE_URL = "YOUR_URL";
const SUPABASE_KEY = "YOUR_KEY";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadProducts() {
  const { data } = await db.from("products").select("*");

  let html = "";

  data.forEach(p => {
    const low = p.stock <= 5 ? "low" : "";

    html += `
      <div class="card">
        <b>${p.name}</b><br>
        <span class="${low}">Stock: ${p.stock}</span>

        <input type="number" id="qty-${p.id}" placeholder="Quantity">

        <button class="sell" onclick="sell('${p.id}', ${p.stock})">Sell</button>
        <button class="stock" onclick="addStock('${p.id}', ${p.stock})">Add Stock</button>
      </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

async function addProduct() {
  const name = document.getElementById("name").value;
  const stock = parseInt(document.getElementById("stock").value);

  if (!name || !stock) return alert("Fill all fields");

  await db.from("products").insert([{ name, stock }]);

  loadProducts();
}

async function sell(id, stock) {
  const qty = parseInt(document.getElementById(`qty-${id}`).value);

  if (!qty || qty <= 0) return alert("Enter quantity");
  if (qty > stock) return alert("Not enough stock");

  await db.from("products")
    .update({ stock: stock - qty })
    .eq("id", id);

  await db.from("sales")
    .insert([{ product_id: id, quantity: qty }]);

  loadProducts();
  loadTodaySales();
}

async function addStock(id, stock) {
  const qty = parseInt(document.getElementById(`qty-${id}`).value);

  if (!qty || qty <= 0) return alert("Enter quantity");

  await db.from("products")
    .update({ stock: stock + qty })
    .eq("id", id);

  loadProducts();
}

async function loadTodaySales() {
  const today = new Date().toISOString().split("T")[0];

  const { data } = await db
    .from("sales")
    .select("*")
    .gte("created_at", today);

  let total = 0;
  data.forEach(s => total += s.quantity);

  document.getElementById("todaySales").innerText = total;
}

loadProducts();
loadTodaySales();
</script>

</body>
</html>
